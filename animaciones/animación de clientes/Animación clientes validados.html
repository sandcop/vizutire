<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clientes validados</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --ink: #1a1a1a;
    --muted: #9b9b9b;
    --fh: 'Satoshi', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #e9e9e7;
    font-family: var(--fh);
    color: var(--ink);
    min-height: 100vh;
    width: 100%;
  }

  body {
    display: grid;
    place-items: center;
    padding: 24px;
  }

  #root {
    width: 100%;
    max-width: 1280px;
    container-type: inline-size;
    container-name: stage;
  }

  .banner {
    width: 100%;
    background: var(--bg);
    border-radius: 14px;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 28px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    overflow: hidden;
    min-width: 0;
  }

  .label {
    flex: 0 0 auto;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap;
    z-index: 2;
    position: relative;
  }

  /* Container-query based responsiveness — adapts to the panel/iframe width,
     not the browser viewport, so the marquee always has space. */
  @container stage (max-width: 720px) {
    .label { font-size: 16px; }
    .banner { padding: 18px 18px; gap: 16px; }
  }

  @container stage (max-width: 560px) {
    .banner {
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      padding: 16px;
    }
    .track-wrap { width: 100%; }
    .label { text-align: left; }
  }

  .track-wrap {
    flex: 1 1 0;
    min-width: 0;
    position: relative;
    overflow: hidden;
    height: 60px;
    /* Fade out at both edges so logos enter from the right and disappear before
       reaching the label on the left */
    -webkit-mask-image: linear-gradient(
      to right,
      transparent 0%,
      rgba(0,0,0,1) 14%,
      rgba(0,0,0,1) 86%,
      transparent 100%
    );
    mask-image: linear-gradient(
      to right,
      transparent 0%,
      rgba(0,0,0,1) 14%,
      rgba(0,0,0,1) 86%,
      transparent 100%
    );
  }

  .track {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 64px;
    /* Animate one third of the track since we duplicate the list 3x */
    animation: scroll 28s linear infinite;
    will-change: transform;
  }

  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(-100% / 3)); }
  }

  .logo-cell {
    flex: 0 0 auto;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-cell img {
    height: 100%;
    width: auto;
    object-fit: contain;
    /* Match the muted, slightly desaturated look of the reference */
    filter: grayscale(0.05);
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Pause animation when tab not visible (browsers do this anyway, but be explicit) */
  @media (prefers-reduced-motion: reduce) {
    .track { animation-duration: 90s; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
